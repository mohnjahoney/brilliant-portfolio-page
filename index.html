<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Brilliant Portfolio Clips</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="page-shell">
      <header class="intro">
        <div class="project-label" aria-label="Selected work for Brilliant">
          <span>Selected Work /</span>
          <span class="brand-peek">
            <img
              class="brand-mascot"
              src="assets/images/brilliant_org_logo_white.png"
              alt=""
              aria-hidden="true"
            >
            <img
              class="brand-wordmark"
              src="assets/images/brilliant_name_transparent_background.png"
              alt="Brilliant"
            >
          </span>
        </div>
        <div class="intro-layout">
          <div class="intro-cell intro-cell--title">
            <h1 id="page-title"></h1>
          </div>
          <div class="intro-cell intro-cell--copy">
            <div id="page-intro" class="intro-copy"></div>
          </div>
        </div>
      </header>

      <section class="featured-grid" aria-label="Featured clips"></section>

      <section class="supporting-section" aria-label="Supporting clips">
        <div class="supporting-grid"></div>
      </section>
    </main>

    <script type="module" src="main.js"></script>
  </body>
</html>
